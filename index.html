<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandão TV - Links Oficiais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top, #1a1a1a 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .btn-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-link:hover {
            transform: translateY(-3px);
            background: #ef4444;
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.5);
            border-color: transparent;
        }
        /* Efeito de brilho na logo */
        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.5));
        }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        /* Animação de pulsação aprimorada para o texto */
        @keyframes text-glow-pulse {
            0%, 100% { 
                transform: scale(1); 
                filter: drop-shadow(0 0 2px rgba(239, 68, 68, 0));
            }
            50% { 
                transform: scale(1.02); 
                filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.8));
            }
        }

        .pulse {
            animation: pulse-red 2s infinite;
        }

        .text-impact {
            animation: text-glow-pulse 3s ease-in-out infinite;
            background: linear-gradient(to bottom, #ffffff 30%, #f87171 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            white-space: nowrap; /* Garante que não quebre linha */
        }

        /* Cor específica para o WhatsApp no hover */
        .btn-whatsapp:hover {
            background: #25d366 !important;
            box-shadow: 0 10px 20px -5px rgba(37, 211, 102, 0.5) !important;
        }
    </style>
</head>
